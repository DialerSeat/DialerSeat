<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#2a6eff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!--
    Jost Bold "D" glyph extracted from the official OFL-licensed font
    (indestructible-type/Jost, weight 700). Embedded as a vector path so it
    renders identically on every device regardless of installed fonts.

    v22.d recenter — shifted right by ~10 units to correct optical
    centering. The D has a flat left stem and a heavy curved right side,
    so geometric-bbox centering (tx=68.27) made it look left-shifted.
    New tx=78 nudges it right so the visual mass sits at the viewBox
    center.
  -->
  <g transform="translate(78, 426) scale(0.48571, -0.48571)" fill="white" fill-rule="evenodd">
    <path d="M324 0H74V700H324Q439 700 523.0 657.5Q607 615 653.0 536.5Q699 458 699 350Q699 242 653.0 163.5Q607 85 523.0 42.5Q439 0 324 0ZM318 550H248V150H318Q372 150 419.0 168.5Q466 187 495.0 231.0Q524 275 524 350Q524 425 495.0 469.0Q466 513 419.0 531.5Q372 550 318 550Z"/>
  </g>
</svg>